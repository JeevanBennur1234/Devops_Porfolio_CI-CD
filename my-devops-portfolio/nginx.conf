# Nginx configuration for serving the React Single Page Application (SPA)
# Optimized for performance, security, and proper SPA routing

server {
    listen 80;
    server_name localhost;

    # Root directory where the built React files are served from
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # SPA Routing - Critical for React Router
    # ============================================================
    # All routes should fall back to index.html so React can handle routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # Caching - Static Assets (JS, CSS, Images, Fonts)
    # ============================================================
    # Vite generates hashed filenames, so we can cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # Security Headers
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # Performance - Gzip Compression
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ============================================================
    # Error Pages
    # ============================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
