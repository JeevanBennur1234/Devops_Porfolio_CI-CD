---
# ============================================================
# Ansible Playbook: Deploy Application
# ============================================================
# Purpose: Deploy the DevOps Portfolio application using Docker
#          on the target web server(s)
#
# Usage:
#   ansible-playbook -i inventory.ini deploy.yml
#
# What it does:
#   1. Copies project files to the server
#   2. Builds the Docker image
#   3. Stops any existing container
#   4. Starts a new container with the latest build
#   5. Verifies the deployment
# ============================================================

- name: Deploy DevOps Portfolio Application
  hosts: webservers
  become: yes

  vars:
    app_dir: /opt/devops-portfolio
    docker_image: "devops-portfolio"
    docker_tag: "latest"
    container_name: "devops-portfolio"
    container_port: 80
    host_port: 80

  tasks:
    # ========================================================
    # Pre-Deployment Checks
    # ========================================================
    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
      tags: [pre-check]

    - name: Check if application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      tags: [pre-check]

    # ========================================================
    # Copy Application Files
    # ========================================================
    - name: Copy application source code to server
      synchronize:
        src: ../
        dest: "{{ app_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=ansible"
          - "--exclude=.env"
      tags: [copy]

    # ========================================================
    # Build Docker Image
    # ========================================================
    - name: Build Docker image from Dockerfile
      community.docker.docker_image:
        name: "{{ docker_image }}"
        tag: "{{ docker_tag }}"
        source: build
        build:
          path: "{{ app_dir }}"
          pull: yes
        force_source: yes
      tags: [build]

    # ========================================================
    # Deploy Container
    # ========================================================
    - name: Stop and remove existing container (if any)
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes
      tags: [deploy]

    - name: Start new container with latest image
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}:{{ docker_tag }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ host_port }}:{{ container_port }}"
        healthcheck:
          test: ["CMD", "wget", "-qO-", "http://localhost/"]
          interval: 30s
          timeout: 3s
          retries: 3
          start_period: 5s
      tags: [deploy]

    # ========================================================
    # Post-Deployment Verification
    # ========================================================
    - name: Wait for application to be healthy
      uri:
        url: "http://localhost:{{ host_port }}"
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200
      tags: [verify]

    - name: Get running container info
      command: docker ps --filter "name={{ container_name }}" --format "table {% raw %}{{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
      register: container_info
      changed_when: false
      tags: [verify]

    - name: Display deployment summary
      debug:
        msg: |
          ✅ Deployment successful!
          
          Container Details:
          {{ container_info.stdout }}
          
          Application URL: http://{{ ansible_host }}:{{ host_port }}
          Health Check: {{ health_check.status }} OK
      tags: [verify]

    # ========================================================
    # Cleanup Old Images
    # ========================================================
    - name: Remove unused Docker images (cleanup)
      command: docker image prune -f
      changed_when: false
      tags: [cleanup]
