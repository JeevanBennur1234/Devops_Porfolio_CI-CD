<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    h1 { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #14b8a6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .subtitle { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
    .code { background: #1e293b; padding: 0.5rem 1rem; border-radius: 0.5rem; font-family: monospace; color: #14b8a6; display: inline-block; margin-bottom: 2rem; }
    a { display: inline-block; padding: 0.75rem 2rem; background: #14b8a6; color: #fff; text-decoration: none; border-radius: 0.5rem; font-weight: 600; transition: background 0.2s; }
    a:hover { background: #0d9488; }
    .exit-code { margin-top: 2rem; font-family: monospace; color: #475569; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p class="subtitle">Page Not Found</p>
    <div class="code">exit code: 1 - resource not found</div>
    <p>The page you're looking for doesn't exist or has been moved to a different endpoint.</p>
    <a href="/">cd ~/home</a>
    <p class="exit-code">$ _</p>
  </div>
</body>
</html>
