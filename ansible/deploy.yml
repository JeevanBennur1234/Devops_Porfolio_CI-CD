---
- name: CI/CD Deployment Verification
  hosts: local
  gather_facts: yes

  vars:
    deployment_timestamp: "{{ ansible_date_time.iso8601 }}"
    build_number: "{{ lookup('env', 'BUILD_NUMBER') | default('local', true) }}"
    report_file: "deployment-report-{{ build_number }}.txt"

  tasks:
    - name: Verify Node.js installation
      command: node --version
      register: node_version
      changed_when: false
      ignore_errors: yes

    - name: Verify npm installation
      command: npm --version
      register: npm_version
      changed_when: false
      ignore_errors: yes

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false
      ignore_errors: yes

    - name: Verify AWS CLI installation
      command: aws --version
      register: aws_version
      changed_when: false
      ignore_errors: yes

    - name: Create deployment report
      copy:
        dest: "{{ report_file }}"
        content: |
          ========================================
          Deployment Report
          ========================================
          Timestamp:      {{ deployment_timestamp }}
          Build Number:   {{ build_number }}
          ========================================
          Environment Checks:
          ----------------------------------------
          Node.js:        {{ node_version.stdout | default('NOT FOUND', true) }}
          npm:            {{ npm_version.stdout | default('NOT FOUND', true) }}
          Docker:         {{ docker_version.stdout | default('NOT FOUND', true) }}
          AWS CLI:        {{ aws_version.stdout | default('NOT FOUND', true) }}
          ========================================
          Status:         {{ 'ALL CHECKS PASSED' if node_version is success and docker_version is success and aws_version is success else 'SOME CHECKS FAILED' }}
          ========================================

    - name: Print deployment status
      debug:
        msg: |
          ========================================
          Deployment Status
          ========================================
          Node.js:  {{ node_version.stdout | default('NOT FOUND', true) }}
          npm:      {{ npm_version.stdout | default('NOT FOUND', true) }}
          Docker:   {{ docker_version.stdout | default('NOT FOUND', true) }}
          AWS CLI:  {{ aws_version.stdout | default('NOT FOUND', true) }}
          ----------------------------------------
          Report:   {{ report_file }}
          ========================================

    - name: Fail pipeline if critical tools are missing
      fail:
        msg: >
          Critical tool(s) missing during deployment check.
          Node.js: {{ 'OK' if node_version is success else 'MISSING' }},
          Docker: {{ 'OK' if docker_version is success else 'MISSING' }},
          AWS CLI: {{ 'OK' if aws_version is success else 'MISSING' }}
      when: node_version is failed or docker_version is failed or aws_version is failed
