# Ansible Inventory File
# Defines the target servers for deployment
# Update the IP addresses/hostnames with your actual server details

[webservers]
# Replace with your EC2 instance public IP or hostname
# Example: web1 ansible_host=54.210.123.45
web1 ansible_host=YOUR_EC2_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[webservers:vars]
# Common variables for all web servers
ansible_python_interpreter=/usr/bin/python3
docker_image_name=devops-portfolio
docker_container_name=devops-portfolio
docker_container_port=80
app_domain=your-domain.com

[jenkins]
# Jenkins server (if running on a separate machine)
# jenkins1 ansible_host=YOUR_JENKINS_IP ansible_user=ubuntu

[all:vars]
# Variables applied to all hosts
ansible_connection=ssh
ansible_become=yes
ansible_become_method=sudo
